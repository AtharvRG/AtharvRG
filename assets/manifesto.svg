<svg viewBox="0 0 800 300" width="100%" xmlns="http://www.w3.org/2000/svg">
  <style>
    .serif { font-family: "Didot", "Bodoni MT", "Playfair Display", "Times New Roman", ui-serif, serif; }
    .sans { font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Helvetica", "Arial", ui-sans-serif, sans-serif; }
    
    .bg { fill: #F4F4F0; }
    .text-main { fill: #111111; }
    .text-muted { fill: #555555; }
    .grid-line { stroke: #D8D8D4; stroke-width: 1; }

    @media (prefers-color-scheme: dark) {
      .bg { fill: #0D1117; }
      .text-main { fill: #F0F6FC; }
      .text-muted { fill: #8B949E; }
      .grid-line { stroke: #21262D; }
    }
  </style>

  <rect width="100%" height="100%" class="bg" />

  <!-- Continuous Grid Lines from Hero -->
  <line x1="60" y1="0" x2="60" y2="300" class="grid-line" />
  <line x1="740" y1="0" x2="740" y2="300" class="grid-line" />
  <line x1="0" y1="299" x2="800" y2="299" class="grid-line" />

  <!-- Drop Cap -->
  <text x="80" y="100" class="serif text-main" font-size="90">I</text>

  <!-- Editorial Column 1 -->
  <text x="140" y="55" class="sans text-main" font-size="12" font-weight="bold" letter-spacing="1">PHILOSOPHY</text>
  <text x="140" y="80" class="serif text-muted" font-size="16" font-style="italic">build digital experiences</text>
  <text x="140" y="105" class="serif text-muted" font-size="16" font-style="italic">that respect the user's time,</text>
  <text x="80" y="140" class="serif text-muted" font-size="16" font-style="italic">attention, and aesthetic sensibilities.</text>
  <text x="80" y="165" class="serif text-muted" font-size="16" font-style="italic">Code is not just logic; it is a medium</text>
  <text x="80" y="190" class="serif text-muted" font-size="16" font-style="italic">of design and communication.</text>

  <!-- Divider -->
  <line x1="400" y1="40" x2="400" y2="220" class="grid-line" />

  <!-- Editorial Column 2 (Skills as a stark list) -->
  <text x="440" y="55" class="sans text-main" font-size="12" font-weight="bold" letter-spacing="1">THE TOOLKIT</text>
  
  <!-- Skill list mimicking an index -->
  <text x="440" y="90" class="sans text-main" font-size="11" letter-spacing="2">01. TYPESCRIPT / JAVASCRIPT</text>
  <text x="440" y="115" class="sans text-main" font-size="11" letter-spacing="2">02. REACT / NEXT.JS</text>
  <text x="440" y="140" class="sans text-main" font-size="11" letter-spacing="2">03. PYTHON / SYSTEM DESIGN</text>
  <text x="440" y="165" class="sans text-main" font-size="11" letter-spacing="2">04. UI/UX &amp; TYPOGRAPHY</text>
  <text x="440" y="190" class="sans text-main" font-size="11" letter-spacing="2">05. CLOUD INFRASTRUCTURE</text>
</svg>